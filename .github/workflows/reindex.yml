name: Reindex Algolia (DocSearch)

# Rebuilds the Algolia search index from the live site with the open-source
# DocSearch scraper. Runs after each successful Pages deploy, and can be
# triggered manually from the Actions tab (needed for the first-ever index).
#
# Requires one repo secret (Settings > Secrets and variables > Actions > Repository secrets):
#   ALGOLIA_ADMIN_API_KEY    - the Admin API Key (write access; keep secret)
# The Application ID is public (it also ships in docusaurus.config.js), so it is
# hardcoded below rather than stored as a secret.
# The site's search UI uses the Search-Only API Key, set in docusaurus.config.js.

on:
  workflow_run:
    workflows: ["GitHub Pages"]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: algolia-reindex
  cancel-in-progress: true

jobs:
  reindex:
    # Run on manual dispatch, or only when the deploy actually succeeded.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Algolia admin key is present
        env:
          API_KEY: ${{ secrets.ALGOLIA_ADMIN_API_KEY }}
        run: |
          if [ -z "$API_KEY" ]; then
            echo "::error::Repo secret ALGOLIA_ADMIN_API_KEY is not set. Add it under Settings > Secrets and variables > Actions (Repository secrets), named exactly ALGOLIA_ADMIN_API_KEY."
            exit 1
          fi

      - name: Wait for GitHub Pages to publish
        # Pages finishes deploying a little after the build workflow reports done.
        run: sleep 90

      - name: Run DocSearch scraper
        env:
          # Application ID is public (it also ships in docusaurus.config.js), so it is
          # safe to hardcode. Only the admin (write) key must stay a secret.
          APPLICATION_ID: K463YJU60O
          API_KEY: ${{ secrets.ALGOLIA_ADMIN_API_KEY }}
        run: |
          docker run --rm \
            -e APPLICATION_ID \
            -e API_KEY \
            -e CONFIG="$(jq -r tostring docsearch.config.json)" \
            algolia/docsearch-scraper
